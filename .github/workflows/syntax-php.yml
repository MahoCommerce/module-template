name: PHP Syntax Check

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

jobs:
    syntax-php:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                php-version: ['8.3', '8.4', '8.5']

        name: PHP Syntax (PHP ${{ matrix.php-version }})

        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-version }}

            - name: Check PHP syntax
              run: |
                  errors=0
                  while IFS= read -r file; do
                      if ! php -d error_reporting=E_ALL -d short_open_tag=Off -l "$file" > /dev/null 2>&1; then
                          output=$(php -d error_reporting=E_ALL -d short_open_tag=Off -l "$file" 2>&1)
                          echo "::error file=$file::$output"
                          errors=$((errors + 1))
                      fi
                  done < <(find app -type f \( -name '*.php' -o -name '*.phtml' \))
                  if [ $errors -gt 0 ]; then
                      echo "$errors file(s) with syntax errors"
                      exit 1
                  fi
                  echo "All files passed syntax check"
