name: Composer Validate

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

jobs:
    composer:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Validate composer.json
              run: composer validate --strict --no-check-all
