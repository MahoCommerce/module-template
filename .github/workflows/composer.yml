name: Composer Validate

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

jobs:
    composer:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

            - name: Validate composer.json
              run: composer validate --strict --no-check-all
