name: Composer Validate

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

jobs:
    composer:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Validate composer.json
              run: composer validate --strict --no-check-all
